version: '3.8'

services:
  # Packet capture service - sniffs live network traffic
  packet-capture:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: ids-packet-capture
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - DB_PATH=/data/ids.db
    volumes:
      - ./logs:/app/logs
      - ./data:/data
    command: ["python", "-m", "inference.packet_capture"]
    profiles:
      - packet-capture

  # Inference service - reads logs and classifies with CNN
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: ids-inference
    privileged: true
    restart: unless-stopped
    environment:
      - DB_PATH=/data/ids.db
      - POLL_INTERVAL=10
      - BATCH_SIZE=500
      - THRESHOLD=0.90
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./logs:/app/logs
      - ./data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ids-api
    restart: unless-stopped
    privileged: true
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/ids.db
      - THRESHOLD=0.40
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./data:/data