services:
  # Packet capture service - sniffs live network traffic
  packet-capture:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: ids-packet-capture
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    environment:
      - DB_PATH=/data/ids.db
    volumes:
      - ./logs:/app/logs
      - ./data:/data
    command: ["python", "-m", "inference.packet_capture"]
    profiles:
      - packet-capture

  # Inference service - reads logs and classifies with CNN
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: ids-inference
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    environment:
      - DB_PATH=/data/ids.db
      - POLL_INTERVAL=10
      - BATCH_SIZE=500
      - THRESHOLD=0.50
      # Enable automatic firewall blocking of detected attackers
      - AUTO_BLOCK=true
      # Only loopback is auto-protected. Protect your gateway + own host via the
      # dashboard whitelist so the attacker (172.20.10.x) can still be blocked.
      - PROTECTED_NETWORKS=127.0.0.0/8
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./logs:/app/logs
      - ./data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ids-api
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - DB_PATH=/data/ids.db
      - THRESHOLD=0.50
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./data:/data
