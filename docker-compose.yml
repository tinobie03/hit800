version: '3.8'

services:
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: ids-inference
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - DB_PATH=/data/ids.db
      - POLL_INTERVAL=10
      - BATCH_SIZE=500
      - THRESHOLD=0.40
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./logs:/app/logs
      - ./data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ids-api
    network_mode: host
    restart: unless-stopped
    privileged: true
    environment:
      - DB_PATH=/data/ids.db
      - THRESHOLD=0.40
      - MODEL_PATH=model/onemoney_cnn.h5
      - SCALER_PATH=model/scaler.pkl
    volumes:
      - ./data:/data