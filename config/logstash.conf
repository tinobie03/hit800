# ============================================================
# Logstash Pipeline Configuration
# Receives logs from Filebeat, parses and normalises them,
# then forwards to Elasticsearch.
# ============================================================

input {
  # Receive from Filebeat on both VMs
  beats {
    port => 5044
  }
}

filter {

  # ── Parse syslog format ─────────────────────────────────
  if [log][file][path] =~ "syslog" or [log][file][path] =~ "messages" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:source_host} %{PROG:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}"
      }
      tag_on_failure => ["_grokparsefailure_syslog"]
    }
    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
    }
  }

  # ── Parse auth.log (SSH brute force detection) ──────────
  if [log][file][path] =~ "auth" {
    grok {
      match => {
        "message" => [
          "Failed %{WORD:auth_method} for %{USER:target_user} from %{IP:source_ip} port %{INT:source_port}",
          "Accepted %{WORD:auth_method} for %{USER:target_user} from %{IP:source_ip} port %{INT:source_port}",
          "Invalid user %{USER:invalid_user} from %{IP:source_ip}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_auth"]
    }

    # Count failed login events (used as IDS feature)
    if "Failed" in [message] {
      mutate { add_field => { "auth_event" => "FAILED_LOGIN" } }
    }
    if "Accepted" in [message] {
      mutate { add_field => { "auth_event" => "SUCCESSFUL_LOGIN" } }
    }
    if "Invalid user" in [message] {
      mutate { add_field => { "auth_event" => "INVALID_USER" } }
    }
  }

  # ── Normalize and enrich all events ─────────────────────
  mutate {
    # Add VM metadata tag
    add_field => {
      "ids_source"     => "logstash"
      "environment"    => "ids-lab"
    }

    # Convert string numbers to actual integers/floats
    convert => {
      "source_port" => "integer"
      "pid"         => "integer"
    }

    # Remove noisy fields
    remove_field => ["agent", "ecs", "input"]
  }

  # ── Drop completely empty messages ──────────────────────
  if [message] == "" or ![message] {
    drop {}
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "logs-%{+YYYY.MM.dd}"
    # Uncomment for auth-protected ES:
    # user     => "elastic"
    # password => "${ES_PASSWORD}"
  }

  # Debug output (comment out in production)
  stdout {
    codec => rubydebug
  }
}
